<p>Hello from App Root</p>
<app-home></app-home>
<app-about></app-about>
<p>Name: {{userName}}</p>
<p>Email: {{userEmail}}</p>  <!--data interpolation-->
<p>Phone: {{userPhone}}</p>
<button [disabled]="userStatus" [attr.data-status]="status">click</button>   <!--property binding-->  <!--attribute binding-->

<p [style.color]="flag ? 'red' : 'black' ">userName {{userName}}</p> <!--style binding-->

<!--event binding-->
<button class="btn btn-success" (click)="log()">click</button>
<input type="text" class="form-control" (input)="showAlert($event)"/>

<!--2 way binding-->
<input type="text" placeholder="search" [(ngModel)]="searchInput"/>
{{searchInput}}

<!--ng class ,  ng styles-->
<p [ngClass]="{'bg-info':flag}">Hey holla hello</p>
<p [ngStyle]="{color:flag? 'red':'blue'}">Hey holla hello</p>

<!--ng For-->
<div *ngFor="let item of friends">
    <p>Friend name is: {{item}}</p>
</div>


<!--passing data between parent and child-->
<app-child [dataFromParent]="userName"></app-child>
